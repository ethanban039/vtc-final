[build]
  publish = "."

# Pretty URLs — /contact instead of /contact.html
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/wedding-cakes"
  to = "/wedding-cakes.html"
  status = 200

